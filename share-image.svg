<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5f7c"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#2c5f7c"/>

  <!-- Top label -->
  <text x="80" y="90" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.5)" letter-spacing="6">INDEPENDENT COMMUNITY HYDROLOGICAL MONITORING</text>

  <!-- Main title -->
  <text x="80" y="200" font-family="Georgia, serif" font-weight="bold" font-size="88" fill="white" letter-spacing="-2">DAUPHIN LAKE</text>
  <text x="80" y="295" font-family="Georgia, serif" font-weight="bold" font-size="88" fill="#2c5f7c" letter-spacing="-2">WATCH</text>

  <!-- Divider -->
  <rect x="80" y="330" width="120" height="3" fill="#2c5f7c"/>

  <!-- Description -->
  <text x="80" y="390" font-family="Georgia, serif" font-size="28" fill="rgba(255,255,255,0.75)">Live lake level monitoring for Ochre Beach</text>
  <text x="80" y="430" font-family="Georgia, serif" font-size="28" fill="rgba(255,255,255,0.75)">and the Dauphin Lake basin — Spring 2026</text>

  <!-- Status indicators -->
  <rect x="80" y="490" width="18" height="18" rx="9" fill="#1a6b3a"/>
  <text x="110" y="504" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.55)">Normal</text>

  <rect x="210" y="490" width="18" height="18" rx="9" fill="#c8a200"/>
  <text x="240" y="504" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.55)">Watch</text>

  <rect x="330" y="490" width="18" height="18" rx="9" fill="#b84c00"/>
  <text x="360" y="504" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.55)">Advisory</text>

  <rect x="480" y="490" width="18" height="18" rx="9" fill="#8b0000"/>
  <text x="510" y="504" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.55)">Flood Stage</text>

  <!-- URL -->
  <text x="80" y="580" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,255,0.35)" letter-spacing="2">dauphinlakewatch.ca</text>

  <!-- Right side decorative water level graphic -->
  <rect x="850" y="80" width="60" height="470" rx="30" fill="rgba(255,255,255,0.06)"/>
  <rect x="850" y="380" width="60" height="170" rx="30" fill="rgba(44,95,124,0.4)"/>
  <!-- Tick marks -->
  <rect x="920" y="100" width="20" height="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="920" y="180" width="20" height="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="920" y="260" width="20" height="2" fill="rgba(200,0,0,0.5)"/>
  <text x="950" y="264" font-family="Georgia, serif" font-size="14" fill="rgba(200,0,0,0.7)">858 ft flood</text>
  <rect x="920" y="370" width="20" height="2" fill="rgba(200,162,0,0.6)"/>
  <text x="950" y="374" font-family="Georgia, serif" font-size="14" fill="rgba(200,162,0,0.8)">854.8 ft range</text>
  <!-- Current level marker -->
  <rect x="836" y="385" width="88" height="4" rx="2" fill="#2c5f7c"/>
  <text x="950" y="392" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="rgba(255,255,255,0.8)">↑ Current</text>

  <!-- iConnect attribution -->
  <text x="1120" y="600" font-family="Georgia, serif" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="end">iConnect Studio</text>
</svg>
